services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: contas
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:prisma@postgres:5432/contas?schema=evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/6
      AUTHENTICATION_API_KEY: secret_api_key
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://api:3001/webhook/evolution
      WEBHOOK_GLOBAL_EVENTS: "MESSAGES_UPSERT"
    depends_on:
      - postgres
      - redis

  api:
    image: iasconta-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:prisma@postgres:5432/contas?schema=public
      # BOT_DEFAULT_EMAIL: defina no backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  web:
    image: iasconta-web:latest
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pgdata:
  redis_data:
  uploads:
